# Adaptive Asymmetry-Scanner – Konfiguration v4.0
# Alle Parameter hier zentral ändern, nie im Code.

pipeline:
  confidence_gate: 0.70        # MiroFish: Mindest-Anteil Pfade die Strike erreichen
  n_simulation_paths: 10000    # Monte-Carlo Pfade
  simulation_days: 120         # Simulationshorizont in Tagen

filters:
  min_market_cap: 2_000_000_000   # 2 Mrd USD
  min_avg_volume: 1_000_000       # 1 Mio Aktien/Tag (10-Tages-Ø)
  universe: "sp500_nasdaq100"     # sp500_nasdaq100 | sp500 | nasdaq100

models:
  prescreener: "claude-haiku-4-5-20251001"
  deep_analysis: "claude-sonnet-4-6"

risk:
  vix_threshold: 35.0
  earnings_buffer_days: 7
  min_open_interest: 100
  max_bid_ask_ratio: 0.10        # 10%
  max_bear_case_severity: 7      # 0-10

options:
  dte_min: 120
  dte_max: 200
  delta_target_low:  0.60
  delta_target_high: 0.70
  target_move_pct:   0.10        # 10% Strike-Abstand für Simulation

learning:
  learning_rate: 0.05
  min_bin_count:  3              # Mindestdaten vor ML-Scoring
  close_after_days: 130          # Tage bis Trade als abgeschlossen gilt

eps_drift:
  noise_threshold:    0.02
  relevant_threshold: 0.05
  massive_threshold:  0.10

# NEU v4.0: RL-Agent Konfiguration
rl:
  enabled: true                  # false → QuasiML-Fallback
  model_path: "outputs/models/ppo_options_agent.zip"
  min_trades_for_training: 5     # Mindest closed_trades vor erstem Training
  timesteps_per_update: 2000     # PPO-Steps pro feedback.py-Lauf
  # Observation-Gewichte (müssen mit rl_agent.py übereinstimmen)
  obs_weights:
    impact:         0.15
    surprise:       0.10
    mismatch:       0.20
    z_score:        0.05
    eps_drift:      0.10
    hit_rate:       0.15
    iv_rank:        0.05
    sentiment:      0.10
    bear_severity:  0.10

# NEU v4.0: FinBERT Konfiguration
finbert:
  enabled: true
  model_name: "ProsusAI/finbert"
  cache_dir: "outputs/models/finbert"
  max_headlines: 8               # Max Headlines pro Batch-Inference
  max_tokens: 128                # Max Tokens pro Headline (CPU-Performance)

# NEU v4.0: Reddit-Konfiguration
reddit:
  enabled: true
  subreddits:
    - "wallstreetbets"
    - "stocks"
    - "investing"
    - "options"
  max_posts_per_ticker: 50
  time_filter: "day"             # "day" | "week"
  request_delay: 0.5             # Sekunden zwischen Requests (Rate-Limit)
