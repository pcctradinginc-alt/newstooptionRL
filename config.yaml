# Adaptive Asymmetry-Scanner – Konfiguration v4.1
# Alle Parameter hier zentral ändern, nie im Code.

pipeline:
  confidence_gate: 0.70
  n_simulation_paths: 10000
  simulation_days: 120
  min_impact_threshold: 4      # NEU Fix #5: Signale mit Impact < 4 werden nicht simuliert

filters:
  min_market_cap: 2_000_000_000
  min_avg_volume: 1_000_000
  universe: "sp500_nasdaq100"

models:
  prescreener: "claude-haiku-4-5-20251001"
  deep_analysis: "claude-sonnet-4-6"

risk:
  vix_threshold: 35.0
  earnings_buffer_days: 7
  min_open_interest: 100
  max_bid_ask_ratio: 0.10
  max_bear_case_severity: 7    # Fix #2: >= 7 blockiert (war > 7 → Severity=7 passierte)

options:
  dte_min: 120
  dte_max: 200
  delta_target_low:  0.60
  delta_target_high: 0.70
  target_move_pct:   0.10

learning:
  learning_rate: 0.05
  min_bin_count:  3
  close_after_days: 130

eps_drift:
  noise_threshold:    0.02
  relevant_threshold: 0.05
  massive_threshold:  0.10

rl:
  enabled: true
  model_path: "outputs/models/ppo_options_agent.zip"
  min_trades_for_training: 5
  timesteps_per_update: 2000
  obs_weights:
    impact:         0.15
    surprise:       0.10
    mismatch:       0.20
    z_score:        0.05
    eps_drift:      0.10
    hit_rate:       0.15
    iv_rank:        0.05
    sentiment:      0.10
    bear_severity:  0.10

finbert:
  enabled: true
  model_name: "ProsusAI/finbert"
  cache_dir: "/tmp/finbert_cache"
  max_headlines: 8
  max_tokens: 128

reddit:
  enabled: true
  subreddits:
    - "wallstreetbets"
    - "stocks"
    - "investing"
    - "options"
  max_posts_per_ticker: 50
  time_filter: "day"
  request_delay: 0.5
