name: Adaptive Asymmetry-Scanner

on:
  schedule:
    # 14:30 MEZ = 12:30 UTC (Mo-Fr)
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    name: Daily Pipeline Run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:   ${{ secrets.TRADIER_API_KEY }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PW:      ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          # FIX: FinBERT-Cache nach /tmp → wird nicht committed
          FINBERT_CACHE:     /tmp/finbert_cache
        run: python pipeline.py

      - name: Run Feedback Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:   ${{ secrets.TRADIER_API_KEY }}
          FINBERT_CACHE:     /tmp/finbert_cache
        run: python feedback.py

      - name: Commit Reports & History
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Nur outputs/ committen – NICHT outputs/models/finbert/
          git add outputs/daily_reports/
          git add outputs/history.json
          # PPO-Modell committen wenn vorhanden (klein, <1 MB)
          git add outputs/models/ppo_options_agent.zip 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
          git push

  feedback_weekly:
    name: Weekly Weight Recalibration
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 6'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run Feedback Loop (Weekly)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINBERT_CACHE:     /tmp/finbert_cache
        run: python feedback.py

      - name: Commit Updated History & RL-Modell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/history.json
          git add outputs/models/ppo_options_agent.zip 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: weekly weight recalibration $(date -u +%Y-%m-%d)"
          git push
