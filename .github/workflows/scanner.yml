name: Adaptive Asymmetry-Scanner

on:
  schedule:
    # FIX 1: 15:00 UTC = 11:00 EST (30 Min nach US-Open um 14:30 UTC)
    # Vorher: 12:30 UTC = vor Markteröffnung → Preise sind Vortages-Schlusskurse
    # Jetzt:  15:00 UTC = nach Open → echte Live-Preise, Pre-Market-Gap sichtbar
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    name: Daily Pipeline Run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:       ${{ secrets.TRADIER_API_KEY }}
          NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
          GMAIL_SENDER:          ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PW:          ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FLASH_ALPHA_API_KEY:   ${{ secrets.FLASH_ALPHA_API_KEY }}
          EULERPOOL_API_KEY:     ${{ secrets.EULERPOOL_API_KEY }}
          FINBERT_CACHE:         /tmp/finbert_cache
        run: python pipeline.py

      - name: Run Feedback Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:   ${{ secrets.TRADIER_API_KEY }}
          FINBERT_CACHE:     /tmp/finbert_cache
        run: python feedback.py


      - name: Commit Reports & History
              run: |
                        git config user.name  "github-actions[bot]"
                                  git config user.email "github-actions[bot]@users.noreply.github.com"
                                            git add outputs/daily_reports/ outputs/history.json
                                                      git add outputs/models/ppo_options_agent.zip 2>/dev/null || true
                                                                git diff --staged --quiet || git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
                                                                          git pull --rebase origin main
                                                                                    git push --force-with-lease
      - name: Commit Reports & History
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add outputs/daily_reports/
          git add outputs/history.json
          git add outputs/models/ppo_options_agent.zip 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
          git push --force-with-lease
